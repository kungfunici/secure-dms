version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: secure-dms-db
    environment:
      POSTGRES_DB: secure_dms
      POSTGRES_USER: dms_user
      POSTGRES_PASSWORD: dms_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
