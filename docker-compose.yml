services:
  postgres:
    image: postgres:16-alpine
    container_name: secure-dms-db
    environment:
      POSTGRES_DB: secure_dms
      POSTGRES_USER: dms_user
      POSTGRES_PASSWORD: dms_secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  libreoffice:
    build:
      context: ./libreoffice-sidecar
    container_name: secure-dms-lo
    ports:
      - "3001:3000"
    restart: unless-stopped

volumes:
  postgres_data:
