version: "3.9"

x-logging: &default-logging
  options:
    max-size: "10m"
    max-file: "3"
  driver: json-file

services:
  reverse-proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend
      - frontend
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    logging: *default-logging

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=s3
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-secure_dms}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-dms_user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-dms_secret}
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-secure-dms}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - backend-tmp:/tmp
    logging: *default-logging

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    expose:
      - "5432"
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-secure_dms}
      - POSTGRES_USER=${POSTGRES_USER:-dms_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-dms_secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dms_user} -d ${POSTGRES_DB:-secure_dms}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  docuseal:
    image: docuseal/docuseal:latest
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DOCUSEAL_DB_USER:-docuseal}:${DOCUSEAL_DB_PASSWORD:-docuseal}@docuseal-db:5432/${DOCUSEAL_DB:-docuseal}
      - SECRET_KEY_BASE=${DOCUSEAL_SECRET_KEY_BASE}
      - HOST=${DOCUSEAL_HOST:-http://localhost:3000}
    depends_on:
      docuseal-db:
        condition: service_healthy
    logging: *default-logging

  docuseal-db:
    image: postgres:16-alpine
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=${DOCUSEAL_DB:-docuseal}
      - POSTGRES_USER=${DOCUSEAL_DB_USER:-docuseal}
      - POSTGRES_PASSWORD=${DOCUSEAL_DB_PASSWORD:-docuseal}
    volumes:
      - docuseal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DOCUSEAL_DB_USER:-docuseal} -d ${DOCUSEAL_DB:-docuseal}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    expose:
      - "9000"
      - "9001"
    env_file:
      - .env
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

volumes:
  postgres-data:
  minio-data:
  caddy-data:
  caddy-config:
  backend-tmp:
  docuseal-db-data:
