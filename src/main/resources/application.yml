spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/secure_dms
    username: dms_user
    password: dms_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  jwt:
    secret: ${JWT_SECRET:changeme-use-a-real-256bit-secret-in-production-please}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}

  rate-limit:
    login-requests-per-minute: 10
    api-requests-per-minute: 100

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    dev.securecdms: DEBUG
    org.springframework.security: INFO
