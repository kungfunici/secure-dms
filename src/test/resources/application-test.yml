spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  jwt:
    secret: test-secret-key-that-is-at-least-thirty-two-characters-long
    expiration-ms: 3600000
    refresh-expiration-ms: 604800000

  storage:
    upload-dir: ${java.io.tmpdir}/secure-dms-test

  rate-limit:
    login-requests-per-minute: 1000
    api-requests-per-minute: 1000

server:
  port: 0
  error:
    include-message: never
    include-stacktrace: never

logging:
  level:
    dev.securecdms: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
